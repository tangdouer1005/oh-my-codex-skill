lab_name: example-lab
default_transfer_method: rsync
default_log_dir: logs

secret_provider_config:
  bitwarden:
    server_url: https://vault.bitwarden.com
    email: fill-me
    local_config: ~/.config/lab-cluster-ops/config.json
    ssh_agent_socket: ~/.bitwarden-ssh-agent.sock
    notes:
      - Server URL and email are non-secret convenience config.
      - Use a custom server URL only for self-hosted Bitwarden.
      - SSH keys should use Bitwarden Desktop SSH Agent before local private-key files.
      - Do not store master password, API key, TOTP seed, current TOTP code, or private-key contents in this inventory.

machines:
  - name: lab-baremetal-01
    category: direct-ssh
    description: self-maintained server
    ssh_alias: fill-me
    hostname: fill-me
    user: fill-me
    port: 22
    identity_file:
    auth_mode: ssh-key
    secret_provider: bitwarden
    bitwarden_item: fill-me
    password_ref:
    totp_ref:
    ssh_key_ref: bitwarden:ssh-agent:fill-me
    ssh_key_mode: bitwarden-ssh-agent
    identity_agent: ~/.bitwarden-ssh-agent.sock
    scheduler: none
    gpu_type: fill-me
    workspace_root: /path/to/work
    storage_root: /path/to/data
    access_status: available
    env_bootstrap:
      - source ~/.zshrc
      - conda activate my-env
    notes:
      - preferred for interactive debugging

